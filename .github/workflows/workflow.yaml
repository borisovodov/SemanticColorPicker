name: build and test
on: [push]
jobs:
  build:
    runs-on: macos-26
    steps:
    - uses: SwiftyLab/setup-swift@latest
    - uses: actions/checkout@main
    - name: Get Swift version
      run: swift --version
    - name: Build
      run: swift build
    - name: Test
      run: swift test --enable-code-coverage
    - uses: vapor/swift-codecov-action@v0.3.2
      with:
        codecov_token: ${{ secrets.CODECOV_TOKEN }}